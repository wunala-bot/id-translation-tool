<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>证件翻译生成器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      padding: 24px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .tab:hover:not(.active) {
      background: #f0f0f0;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .upload-area:hover {
      border-color: var(--accent);
    }
    .upload-area.has-image {
      border-style: solid;
      border-color: var(--border);
      padding: 12px;
    }
    .upload-area img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 4px;
    }
    .upload-hint {
      color: var(--muted);
      font-size: 14px;
    }
    input[type="file"] { display: none; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }
    .field input, .field select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .field .auto-translated {
      background: #f0f7ff;
      border-color: #bfdbfe;
    }
    .field .auto-translated:focus {
      border-color: #60a5fa;
    }
    .field-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #f0f0f0;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    /* Preview / PDF output - ID card style */
    #pdf-preview {
      background: white;
      padding: 40px;
      max-width: 800px;
      margin: 20px auto 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .preview-page {
      page-break-after: always;
      margin-bottom: 40px;
    }
    .preview-page:last-child {
      page-break-after: auto;
      margin-bottom: 0;
    }
    .preview-image {
      text-align: center;
      margin-bottom: 24px;
    }
    .preview-image img {
      max-width: 100%;
      max-height: 400px;
      border: 1px solid #ddd;
    }
    .preview-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ID Card style box */
    .id-card-box {
      border: 2px solid #1a1a1a;
      border-radius: 12px;
      padding: 24px 32px;
      background: #fafafa;
      max-width: 600px;
      margin: 0 auto;
    }
    .id-card-header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ccc;
    }
    .id-card-header .line1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 1px;
    }
    .id-card-header .line2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 4px;
    }
    .id-card-row {
      display: block;
      margin-bottom: 14px;
      font-size: 14px;
      overflow: hidden;
    }
    .id-card-row-inline {
      display: inline-block;
      width: 48%;
      margin-bottom: 14px;
      vertical-align: top;
    }
    .id-card-label {
      font-weight: 600;
      color: #333;
      display: inline-block;
      min-width: 140px;
      vertical-align: top;
    }
    .id-card-value {
      color: #1a1a1a;
      display: inline;
      word-break: break-all;
    }
    .id-card-separator {
      border: none;
      border-top: 1px solid #ddd;
      margin: 16px 0;
    }

    @media print {
      body { padding: 0; background: white; }
      .container > *:not(#pdf-preview) { display: none; }
      #pdf-preview { border: none; margin: 0; padding: 0; }
    }
    @media (max-width: 600px) {
      body { padding: 12px; }
      .id-card-box { padding: 16px 20px; }
      .id-card-label { min-width: 100px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>证件翻译生成器</h1>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('idcard')">身份证</div>
      <div class="tab" onclick="switchTab('hukou')">户口本</div>
    </div>

    <!-- 身份证面板 -->
    <div id="panel-idcard" class="panel active">
      <div class="section">
        <div class="section-title">正面照片</div>
        <div class="upload-area" onclick="document.getElementById('id-front').click()">
          <input type="file" id="id-front" accept="image/*" onchange="previewImage(this, 'id-front-preview')">
          <div id="id-front-placeholder" class="upload-hint">点击上传身份证正面照片</div>
          <img id="id-front-preview" style="display:none">
        </div>
      </div>
      <div class="section">
        <div class="section-title">正面翻译内容</div>
        <div class="form-grid">
          <div class="field">
            <label>签发机关</label>
            <input type="text" id="id-front-issuer" placeholder="如：北京市公安局海淀分局" oninput="autoTranslate('id-front-issuer', 'id-front-issuer-en', 'issuer')">
            <div class="field-hint">输入中文后自动翻译</div>
          </div>
          <div class="field">
            <label>英文签发机关</label>
            <input type="text" id="id-front-issuer-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>有效期限</label>
            <input type="text" id="id-front-valid" placeholder="如：2020.01.01 - 2040.01.01" oninput="autoTranslate('id-front-valid', 'id-front-valid-en', 'validity')">
          </div>
          <div class="field">
            <label>英文有效期限</label>
            <input type="text" id="id-front-valid-en" class="auto-translated" placeholder="自动翻译">
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">背面照片</div>
        <div class="upload-area" onclick="document.getElementById('id-back').click()">
          <input type="file" id="id-back" accept="image/*" onchange="previewImage(this, 'id-back-preview')">
          <div id="id-back-placeholder" class="upload-hint">点击上传身份证背面照片</div>
          <img id="id-back-preview" style="display:none">
        </div>
      </div>
      <div class="section">
        <div class="section-title">背面翻译内容</div>
        <div class="form-grid">
          <div class="field">
            <label>姓名</label>
            <input type="text" id="id-back-fullname" placeholder="中文姓名" oninput="autoTranslate('id-back-fullname', 'id-back-fullname-en', 'name')">
          </div>
          <div class="field">
            <label>英文姓名</label>
            <input type="text" id="id-back-fullname-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>性别</label>
            <select id="id-back-gender" onchange="autoTranslate('id-back-gender', 'id-back-gender-en', 'gender')">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="field">
            <label>英文性别</label>
            <input type="text" id="id-back-gender-en" class="auto-translated" placeholder="自动翻译" readonly>
          </div>
          <div class="field">
            <label>民族</label>
            <input type="text" id="id-back-ethnic" placeholder="如：汉" oninput="autoTranslate('id-back-ethnic', 'id-back-ethnic-en', 'ethnic')">
          </div>
          <div class="field">
            <label>英文民族</label>
            <input type="text" id="id-back-ethnic-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>出生日期</label>
            <input type="text" id="id-back-dob" placeholder="如：1990年1月1日" oninput="autoTranslate('id-back-dob', 'id-back-dob-en', 'dob')">
          </div>
          <div class="field">
            <label>英文出生日期</label>
            <input type="text" id="id-back-dob-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>住址</label>
            <input type="text" id="id-back-address" placeholder="完整住址" oninput="autoTranslate('id-back-address', 'id-back-address-en', 'address')">
          </div>
          <div class="field">
            <label>英文住址</label>
            <input type="text" id="id-back-address-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>公民身份号码</label>
            <input type="text" id="id-back-idnum" placeholder="18位身份证号" oninput="autoTranslate('id-back-idnum', 'id-back-idnum-en', 'idnum')">
          </div>
          <div class="field">
            <label>英文身份号码</label>
            <input type="text" id="id-back-idnum-en" class="auto-translated" placeholder="自动翻译">
          </div>
        </div>
      </div>
    </div>

    <!-- 户口本面板 -->
    <div id="panel-hukou" class="panel">
      <div class="section">
        <div class="section-title">户口本首页照片</div>
        <div class="upload-area" onclick="document.getElementById('hk-cover').click()">
          <input type="file" id="hk-cover" accept="image/*" onchange="previewImage(this, 'hk-cover-preview')">
          <div id="hk-cover-placeholder" class="upload-hint">点击上传户口本首页照片</div>
          <img id="hk-cover-preview" style="display:none">
        </div>
      </div>
      <div class="section">
        <div class="section-title">首页翻译内容</div>
        <div class="form-grid">
          <div class="field">
            <label>户别</label>
            <input type="text" id="hk-cover-type" value="居民家庭户口" oninput="autoTranslate('hk-cover-type', 'hk-cover-type-en', 'household_type')">
          </div>
          <div class="field">
            <label>英文户别</label>
            <input type="text" id="hk-cover-type-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>户主姓名</label>
            <input type="text" id="hk-cover-head" placeholder="户主姓名" oninput="autoTranslate('hk-cover-head', 'hk-cover-head-en', 'name')">
          </div>
          <div class="field">
            <label>英文户主姓名</label>
            <input type="text" id="hk-cover-head-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>户号</label>
            <input type="text" id="hk-cover-num" placeholder="户号" oninput="autoTranslate('hk-cover-num', 'hk-cover-num-en', 'household_num')">
          </div>
          <div class="field">
            <label>英文户号</label>
            <input type="text" id="hk-cover-num-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>住址</label>
            <input type="text" id="hk-cover-address" placeholder="完整住址" oninput="autoTranslate('hk-cover-address', 'hk-cover-address-en', 'address')">
          </div>
          <div class="field">
            <label>英文住址</label>
            <input type="text" id="hk-cover-address-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>承办人签章</label>
            <input type="text" id="hk-cover-agent" placeholder="承办人" oninput="autoTranslate('hk-cover-agent', 'hk-cover-agent-en', 'agent')">
          </div>
          <div class="field">
            <label>英文承办人</label>
            <input type="text" id="hk-cover-agent-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>签发日期</label>
            <input type="text" id="hk-cover-date" placeholder="如：2020年1月1日" oninput="autoTranslate('hk-cover-date', 'hk-cover-date-en', 'date')">
          </div>
          <div class="field">
            <label>英文签发日期</label>
            <input type="text" id="hk-cover-date-en" class="auto-translated" placeholder="自动翻译">
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">常住人口登记卡照片</div>
        <div class="upload-area" onclick="document.getElementById('hk-page').click()">
          <input type="file" id="hk-page" accept="image/*" onchange="previewImage(this, 'hk-page-preview')">
          <div id="hk-page-placeholder" class="upload-hint">点击上传常住人口登记卡照片</div>
          <img id="hk-page-preview" style="display:none">
        </div>
      </div>
      <div class="section">
        <div class="section-title">登记卡翻译内容</div>
        <div class="form-grid">
          <div class="field">
            <label>姓名</label>
            <input type="text" id="hk-page-name" placeholder="姓名" oninput="autoTranslate('hk-page-name', 'hk-page-name-en', 'name')">
          </div>
          <div class="field">
            <label>英文姓名</label>
            <input type="text" id="hk-page-name-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>户别或与户主关系</label>
            <input type="text" id="hk-page-relation" placeholder="如：户主 / 之女" oninput="autoTranslate('hk-page-relation', 'hk-page-relation-en', 'relation')">
          </div>
          <div class="field">
            <label>英文关系</label>
            <input type="text" id="hk-page-relation-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>曾用名</label>
            <input type="text" id="hk-page-former" placeholder="无 / 曾用名" oninput="autoTranslate('hk-page-former', 'hk-page-former-en', 'former_name')">
          </div>
          <div class="field">
            <label>英文曾用名</label>
            <input type="text" id="hk-page-former-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>性别</label>
            <select id="hk-page-gender" onchange="autoTranslate('hk-page-gender', 'hk-page-gender-en', 'gender')">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="field">
            <label>英文性别</label>
            <input type="text" id="hk-page-gender-en" class="auto-translated" placeholder="自动翻译" readonly>
          </div>
          <div class="field">
            <label>出生地</label>
            <input type="text" id="hk-page-birthplace" placeholder="如：北京市海淀区" oninput="autoTranslate('hk-page-birthplace', 'hk-page-birthplace-en', 'birthplace')">
          </div>
          <div class="field">
            <label>英文出生地</label>
            <input type="text" id="hk-page-birthplace-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>民族</label>
            <input type="text" id="hk-page-ethnic" placeholder="如：汉族" oninput="autoTranslate('hk-page-ethnic', 'hk-page-ethnic-en', 'ethnic')">
          </div>
          <div class="field">
            <label>英文民族</label>
            <input type="text" id="hk-page-ethnic-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>籍贯</label>
            <input type="text" id="hk-page-origin" placeholder="如：北京市" oninput="autoTranslate('hk-page-origin', 'hk-page-origin-en', 'origin')">
          </div>
          <div class="field">
            <label>英文籍贯</label>
            <input type="text" id="hk-page-origin-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>出生日期</label>
            <input type="text" id="hk-page-dob" placeholder="如：1990年1月1日" oninput="autoTranslate('hk-page-dob', 'hk-page-dob-en', 'dob')">
          </div>
          <div class="field">
            <label>英文出生日期</label>
            <input type="text" id="hk-page-dob-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>本市/县其他住址</label>
            <input type="text" id="hk-page-otheraddr" placeholder="无 / 其他住址" oninput="autoTranslate('hk-page-otheraddr', 'hk-page-otheraddr-en', 'other_addr')">
          </div>
          <div class="field">
            <label>英文其他住址</label>
            <input type="text" id="hk-page-otheraddr-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>宗教信仰</label>
            <input type="text" id="hk-page-religion" value="无" oninput="autoTranslate('hk-page-religion', 'hk-page-religion-en', 'religion')">
          </div>
          <div class="field">
            <label>英文宗教信仰</label>
            <input type="text" id="hk-page-religion-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>公民身份证件编号</label>
            <input type="text" id="hk-page-idnum" placeholder="18位身份证号" oninput="autoTranslate('hk-page-idnum', 'hk-page-idnum-en', 'idnum')">
          </div>
          <div class="field">
            <label>英文证件编号</label>
            <input type="text" id="hk-page-idnum-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>身高</label>
            <input type="text" id="hk-page-height" placeholder="如：175cm" oninput="autoTranslate('hk-page-height', 'hk-page-height-en', 'height')">
          </div>
          <div class="field">
            <label>英文身高</label>
            <input type="text" id="hk-page-height-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>血型</label>
            <input type="text" id="hk-page-blood" placeholder="如：A型 / 未知" oninput="autoTranslate('hk-page-blood', 'hk-page-blood-en', 'blood')">
          </div>
          <div class="field">
            <label>英文血型</label>
            <input type="text" id="hk-page-blood-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>文化程度</label>
            <input type="text" id="hk-page-edu" placeholder="如：大学本科" oninput="autoTranslate('hk-page-edu', 'hk-page-edu-en', 'education')">
          </div>
          <div class="field">
            <label>英文文化程度</label>
            <input type="text" id="hk-page-edu-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>婚姻状况</label>
            <input type="text" id="hk-page-marriage" placeholder="如：未婚" oninput="autoTranslate('hk-page-marriage', 'hk-page-marriage-en', 'marriage')">
          </div>
          <div class="field">
            <label>英文婚姻状况</label>
            <input type="text" id="hk-page-marriage-en" class="auto-translated" placeholder="自动翻译">
          </div>
          <div class="field">
            <label>兵役状况</label>
            <input type="text" id="hk-page-military" value="未服兵役" oninput="autoTranslate('hk-page-military', 'hk-page-military-en', 'military')">
          </div>
          <div class="field">
            <label>英文兵役状况</label>

    function autoTranslate(cnId, enId, type) {

        enField.value = '';

      }

      // 先查字典

      // 如果没找到，根据类型处理
      if (!translated) {
        switch (type) {
          case 'gender':
            translated = cnVal === '男' ? 'Male' : (cnVal === '女' ? 'Female' : cnVal);
            break;
          case 'dob':
          case 'date':
            translated = translateDate(cnVal);
            break;
          case 'validity':
            translated = translateValidity(cnVal);
            break;
          case 'address':
          case 'birthplace':
          case 'origin':
            translated = translateAddress(cnVal);
            break;
          case 'name':
            translated = translateName(cnVal);
            break;
          case 'height':
            translated = cnVal;
            break;
          case 'idnum':
          case 'household_num':
            translated = cnVal;
            break;
          case 'issuer':
            translated = translateIssuer(cnVal);
            break;
          case 'authority':
            translated = translateAuthority(cnVal);
            break;
          case 'agent':
            translated = cnVal;
            break;
          case 'workplace':

            break;
          case 'job':

            break;

            break;

            break;

    // 日期翻译：1990年1月1日 → January 1, 1990
    function translateDate(dateStr) {
      const match = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
      if (!match) return dateStr;
      const months = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];
      return `${months[parseInt(match[2])-1]} ${match[3]}, ${match[1]}`;
    }

    // 有效期翻译
    function translateValidity(val) {
      const match = val.match(/(\d{4}\.\d{2}\.\d{2})\s*[-~]\s*(\d{4}\.\d{2}\.\d{2})/);
      if (match) return `${match[1]} - ${match[2]}`;
      return val;
    }

    // 地址翻译（简单处理，保留中文地名拼音）
    function translateAddress(addr) {
      // 常见地址替换
      const replacements = {
        '省': 'Province',
        '市': 'City',
        '区': 'District',
        '县': 'County',
        '镇': 'Town',
        '乡': 'Township',
        '街道': 'Subdistrict',
        '路': 'Road',
        '街': 'Street',
        '巷': 'Lane',
        '号': 'No.',
        '栋': 'Building',
        '单元': 'Unit',
        '室': 'Room',
        '楼': 'Floor',
        '层': 'Floor',
      };
      let result = addr;
      for (const [cn, en] of Object.entries(replacements)) {
        result = result.replace(new RegExp(cn, 'g'), ' ' + en);
      }
      return result.replace(/\s+/g, ' ').trim();
    }

    // 姓名翻译（拼音转换）
    function translateName(name) {
      // 简单处理：如果已经是拼音或英文，直接返回
      if (/^[A-Za-z\s]+$/.test(name)) return name;
      // 否则返回提示，让用户手动输入拼音
      return name + ' (Pinyin required)';
    }

    // 签发机关翻译
    function translateIssuer(issuer) {
      const replacements = {
        '公安局': 'Public Security Bureau',
        '分局': 'Branch',
        '派出所': 'Police Station',
      };
      let result = issuer;
      for (const [cn, en] of Object.entries(replacements)) {
        result = result.replace(new RegExp(cn, 'g'), en);
      }
      return result;
    }

    // 登记机关翻译
    function translateAuthority(auth) {
      return auth.replace('派出所', 'Police Station');
    }

    // 迁移记录翻译
    function translateMigrate(rec) {
      return rec.replace(/(\d{4})年(\d{1,2})月(\d{1,2})日/, (m, y, mth, d) => {
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[parseInt(mth)-1]} ${d}, ${y}`;
      }).replace('由', 'from').replace('迁来', 'moved to');
    }

      document.getElementById('panel-' + tab).classList.add('active');

    function previewImage(input, previewId) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById(previewId);
        img.src = e.target.result;
        img.style.display = 'block';
        img.parentElement.classList.add('has-image');
        const placeholder = img.parentElement.querySelector('.upload-hint');
        if (placeholder) placeholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // 构建 ID card 风格的页面（只保留英文）
    // rows 可以是 [label, value] 或 {label, value, half: true}
    function buildCardPage(title, imgId, rows, headerLines) {
      const img = document.getElementById(imgId);
      let html = '<div class="preview-page">';
      html += `<div class="preview-title">${title}</div>`;
      if (img && img.src && img.style.display !== 'none') {
        html += `<div class="preview-image"><img src="${img.src}"></div>`;
      }
      html += '<div class="id-card-box">';
      if (headerLines) {
        html += '<div class="id-card-header">';
        headerLines.forEach((line, i) => {
          html += `<div class="line${i+1}">${line}</div>`;
        });
        html += '</div>';
      } else {
        html += '<div class="id-card-header"><div class="line1">People\'s Republic of China</div></div>';
      }
      rows.forEach((row) => {
        if (Array.isArray(row)) {
          const [label, value] = row;
          if (value) {
            html += `<div class="id-card-row"><span class="id-card-label">${label}</span><span class="id-card-value">${value}</span></div>`;
          }
        } else if (row.half && row.items) {
          // 同行排列
          html += '<div>';
          row.items.forEach(([label, value]) => {
            if (value) {
              html += `<div class="id-card-row-inline"><span class="id-card-label">${label}</span><span class="id-card-value">${value}</span></div>`;
            }
          });
          html += '</div>';
        }
      });
      html += '</div></div>';
      return html;
    }

    function generatePDF() {
      const el = document.getElementById('pdf-preview');
      el.innerHTML = generatePreviewHTML();
      el.style.display = 'block';

      // 检查是否有内容
      const content = el.innerHTML.trim();
      if (!content || content === '') {
        alert('没有内容可导出。请先填写证件信息。');
        el.style.display = 'none';
        return;
      }

      // 滚动到预览区域确保浏览器渲染
      el.scrollIntoView({ behavior: 'instant', block: 'start' });

      const opt = {
        margin: [10, 10, 10, 10],
        filename: 'document-translation.pdf',
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // 延迟执行以确保 DOM 渲染完成
      setTimeout(() => {
        html2pdf().set(opt).from(el).save().then(() => {
          if (!previewVisible) {
            el.style.display = 'none';
          }
        }).catch(err => {
          console.error('PDF generation failed:', err);
          alert('PDF 生成失败: ' + err.message);
        });
      }, 800);
    }
  </script>
</body>
</html>
